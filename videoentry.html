<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Entry – Aditi Venkat</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: "Courier New", monospace;
      background: #050713;
    }

    /* Portfolio background as iframe */
    #bg-frame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      pointer-events: none;
      filter: blur(3px) brightness(0.45);
      transform: scale(1.04);
    }

    /* Dark overlay */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(5, 7, 19, 0.55);
      backdrop-filter: blur(2px);
    }

    /* Floating window */
    .window {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: min(760px, 90vw);
      background: rgba(10, 11, 24, 0.92);
      border: 1px solid rgba(232, 220, 204, 0.18);
      border-radius: 12px;
      box-shadow:
        0 40px 100px rgba(0, 0, 0, 0.7),
        0 0 0 1px rgba(232, 220, 204, 0.06),
        inset 0 1px 0 rgba(232, 220, 204, 0.08);
      overflow: hidden;
      z-index: 10;
    }

    /* Titlebar */
    .titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: rgba(232, 220, 204, 0.04);
      border-bottom: 1px solid rgba(232, 220, 204, 0.1);
    }
    .titlebar-dots {
      display: flex;
      gap: 6px;
    }
    .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: rgba(232, 220, 204, 0.15);
    }
    .dot.close {
      background: #c0625a;
      cursor: pointer;
      text-decoration: none;
    }
    .dot.close:hover { background: #e0746b; }
    .titlebar-title {
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(232, 220, 204, 0.4);
    }
    .titlebar-spacer { width: 55px; }

    /* Video area */
    .video-wrap {
      padding: 0;
      background: #000;
      line-height: 0;
      aspect-ratio: 16/9;
    }
    .video-wrap iframe {
      width: 100%;
      height: 100%;
      display: block;
      border: none;
    }
  </style>
</head>
<body>

  <iframe id="bg-frame" src="index.html" title="background"></iframe>
  <div class="overlay"></div>

  <div class="window">
    <div class="titlebar">
      <div class="titlebar-dots">
        <a href="index.html" class="dot close" title="Close"></a>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <span class="titlebar-title">Video Entry · Aditi Venkat</span>
      <div class="titlebar-spacer"></div>
    </div>
    <div class="video-wrap">
      <iframe src="https://www.youtube.com/embed/QWmwP7gZpt4?autoplay=1&rel=0" allow="autoplay; fullscreen" allowfullscreen></iframe>
    </div>
  </div>

</body>
</html>
